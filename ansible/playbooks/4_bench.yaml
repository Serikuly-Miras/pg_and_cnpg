- name: Bechmark PostgreSQL 18 VM performance
  hosts: pgbench_vm
  become: true

  tasks:
    - name: Setup results directory
      block:
        - name: Remove local pgbench_results directory if it exists
          file:
            path: "{{ results_base_dir }}/pgbench"
            state: absent

        - name: Recreate local pgbench_results directory
          file:
            path: "{{ results_base_dir }}/pgbench"
            state: directory
            mode: "0755"
      delegate_to: localhost
      run_once: true
      become: false

    - name: Install PostgreSQL client
      block:
        - name: Run the PostgreSQL repository setup script
          command: /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          args:
            creates: /etc/apt/sources.list.d/pgdg.list

        - name: Update apt cache after adding PostgreSQL repo
          apt:
            update_cache: yes
            cache_valid_time: 3600

        - name: Install pgbench client
          apt:
            name: postgresql-contrib-18
            state: present

    - name: Create temp directory
      file:
        path: "{{ temp_dir }}"
        state: directory
        mode: "0700"

    - name: Run benchmarks for all targets
      include_tasks: tasks/run_single_benchmark.yaml
      loop: "{{ pgbench_targets }}"
      loop_control:
        loop_var: target
        label: "{{ target.name }}"

    - name: Cleanup temp directory
      file:
        path: "{{ temp_dir }}"
        state: absent
