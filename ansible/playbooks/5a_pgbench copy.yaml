- name: Bechmark PostgreSQL 18 VM performance with pgbench
  hosts: client_vm
  become: true

  tasks:
    - name: Setup results directory
      block:
        - name: Remove local pgbench_results directory if it exists
          file:
            path: "{{ results_base_dir }}/pgbench"
            state: absent

        - name: Recreate local pgbench_results directory
          file:
            path: "{{ results_base_dir }}/pgbench"
            state: directory
            mode: "0755"
      delegate_to: localhost
      run_once: true
      become: false

    - name: Create temp directory
      file:
        path: "{{ temp_dir }}"
        state: directory
        mode: "0700"

    - name: Run benchmarks for all targets
      include_tasks: tasks/run_single_pgbench_benchmark.yaml
      loop: "{{ bench_targets }}"
      loop_control:
        loop_var: target
        label: "{{ target.name }}"

    - name: Cleanup temp directory
      file:
        path: "{{ temp_dir }}"
        state: absent
