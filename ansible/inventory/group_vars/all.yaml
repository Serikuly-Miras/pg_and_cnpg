---
# PostgreSQL Configuration
# DB Version: 18
# OS Type: linux
# DB Type: oltp
# Total Memory (RAM): 32 GB
# CPUs num: 8
# Data Storage: ssd

postgresql_port: 5432
postgresql_max_connections: 300
postgresql_shared_buffers: "8GB"
postgresql_effective_cache_size: "24GB"
postgresql_maintenance_work_mem: "2GB"
postgresql_checkpoint_completion_target: "0.9"
postgresql_wal_buffers: "16MB"
postgresql_default_statistics_target: "100"
postgresql_random_page_cost: "1.1"
postgresql_effective_io_concurrency: "200"
postgresql_work_mem: "27235kB"
postgresql_huge_pages: "try"
postgresql_min_wal_size: "2GB"
postgresql_max_wal_size: "8GB"
postgresql_max_worker_processes: 8
postgresql_max_parallel_workers_per_gather: 4
postgresql_max_parallel_workers: 8
postgresql_max_parallel_maintenance_workers: 4

# Database credentials (plaintext for testing)
db_username: pgbench
db_password: pgbench
db_name: pgbench

# CNPG Configuration
cnpg_namespace: db
cnpg_cluster_name: pgbench-cluster
cnpg_instances: 1
cnpg_storage_size: "100Gi"
cnpg_storage_class: "local-path"
cnpg_nodeport: 31601
cnpg_username_b64: cGdiZW5jaA== # base64 for pgbench
cnpg_password_b64: cGdiZW5jaA== # base64 for pgbench

# Benchmark Configuration
pgbench_scale: 3000
pgbench_clients: 295
pgbench_jobs: "{{ ansible_facts['processor_vcpus'] }}"
pgbench_duration: 900 # 15 minutes

# Benchmark targets (for looping)
bench_targets:
  - name: cnpg
    host: "{{ hostvars[groups['k3s_worker'][0]]['ansible_host'] }}"
    port: "{{ cnpg_nodeport }}"
    label: cnpg
  - name: pg
    host: "{{ hostvars[groups['pg_vm'][0]]['ansible_host'] }}"
    port: "{{ postgresql_port }}"
    label: pg

# Common packages
common_packages:
  - nano
  - btop
  - curl
  - fish
  - ufw
  - sysbench
  - speedtest-cli
  - nfs-common
  - fio
  - postgresql-common
  - ca-certificates

# Paths
results_base_dir: "./results"
temp_dir: "/tmp/ansible-work"
